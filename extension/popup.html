<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deutschway Extension</title>
  <style>
    :root {
      --bg-color: #f2f2f7;
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(0, 0, 0, 0.05);
      --text-color: #000;
      --text-secondary: #8e8e93;
      --primary-accent: #0056b3;
      --success: #34c759;
      --ger-red: #ff3b30;
      --ger-gold: #ffcc00;
    }

    body[data-theme="dark"] {
      --bg-color: #000000;
      --card-bg: rgba(40, 40, 42, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-color: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      font-variant-ligatures: none;
      letter-spacing: 0.02em;
    }

    body {
      width: 350px;
      background-color: var(--bg-color);
      color: var(--text-color);
      overflow-y: auto;
      padding: 16px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .brand {
      font-size: 1.1rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .streak-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 800;
      font-size: 1rem;
      color: var(--ger-red);
      background: var(--card-bg);
      padding: 6px 12px;
      border-radius: 99px;
      border: 1px solid var(--card-border);
    }

    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 6px;
      background: rgba(0,0,0,0.05);
      border-radius: 99px;
      overflow: hidden;
    }

    body[data-theme="dark"] .progress-bar { background: rgba(255,255,255,0.1); }

    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--ger-red), var(--ger-gold));
      width: 0%;
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    /* Word Carousel */
    .word-carousel {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 12px 0;
    }

    .word-display {
      margin-bottom: 16px;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .word-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .word-trans {
      font-size: 1rem;
      color: var(--primary-accent);
      font-weight: 600;
    }

    .carousel-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-btn {
      background: var(--bg-color);
      border: 1px solid var(--card-border);
      color: var(--text-color);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    
    .nav-btn:hover { background: rgba(0,0,0,0.05); }
    body[data-theme="dark"] .nav-btn:hover { background: rgba(255,255,255,0.1); }
    .nav-btn:disabled { opacity: 0.5; cursor: default; }

    .word-counter {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      min-width: 40px;
      text-align: center;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
      font-weight: 600;
    }

    /* Toggle Switch */
    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: var(--success); }
    input:checked + .slider:before { transform: translateX(20px); }

    .btn-primary {
      display: block;
      width: 100%;
      text-align: center;
      padding: 12px;
      background: var(--primary-accent);
      color: white;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="brand">
      <img src="icon48.png" width="24" height="24" alt="logo" style="filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.2)); object-fit: contain;" />
      Deutschway
    </div>
    <div class="streak-badge">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"></path></svg>
      <span id="streakText">0</span>
    </div>
  </div>

  <div class="glass">
    <div class="stats">
      <span>Tagesziel</span>
      <span id="xpText">0 / 50 XP</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div class="word-carousel" id="wordCarousel" style="display: none;">
      <div class="word-display">
        <div class="word-title" id="wordTitle">Wort</div>
        <div class="word-trans" id="wordTrans">Translation</div>
      </div>
      <div class="carousel-controls">
        <button class="nav-btn" id="prevWordBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <span class="word-counter" id="wordCounter">1 / 5</span>
        <button class="nav-btn" id="nextWordBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
      </div>
    </div>
    <div id="fallbackMsg" style="text-align: center; margin-top: 16px; font-weight: 600; color: var(--text-secondary);">
      Öffne die App, um Wörter zu lernen!
    </div>
  </div>

  <div class="glass">
    <div class="settings-row">
      <span style="display: flex; align-items: center; gap: 8px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        Auto-Öffnen
      </span>
      <label class="toggle-switch">
        <input type="checkbox" id="openOnNewTabToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <button class="btn-primary" id="openAppBtn">Zur App gehen</button>

  <script src="popup.js"></script>
</body>
</html>
