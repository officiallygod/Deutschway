<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deutschway Extension</title>
  <style>
    :root {
      --bg-color: #f2f2f7;
      --card-bg: rgba(255, 255, 255, 0.4);
      --card-border: rgba(255, 255, 255, 0.5);
      --text-color: #000;
      --text-secondary: #8e8e93;
      --primary-accent: #0056b3;
      --success: #34c759;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #000000;
        --card-bg: rgba(40, 40, 42, 0.5);
        --card-border: rgba(255, 255, 255, 0.08);
        --text-color: #ffffff;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      font-variant-ligatures: none;
      letter-spacing: 0.02em;
    }

    body {
      width: 350px;
      height: auto;
      min-height: 400px;
      background-color: var(--bg-color);
      color: var(--text-color);
      padding: 16px;
      overflow-y: auto;
    }

    .glass {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 1.2rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header img {
      width: 24px;
      height: 24px;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 6px;
      background: rgba(0,0,0,0.05);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    @media (prefers-color-scheme: dark) {
      .progress-bar { background: rgba(255,255,255,0.1); }
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, #ff3b30, #ffcc00);
      width: 0%;
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 8px;
      margin-top: 12px;
    }

    .word-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .word-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 8px 12px;
      background: rgba(0,0,0,0.03);
      border-radius: 8px;
    }

    @media (prefers-color-scheme: dark) {
      .word-item { background: rgba(255,255,255,0.05); }
    }

    .word-translation {
      color: var(--text-secondary);
      font-weight: 500;
    }

    .settings {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 8px 0;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--success);
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .btn-primary {
      display: block;
      width: 100%;
      text-align: center;
      padding: 12px;
      background: var(--primary-accent);
      color: white;
      text-decoration: none;
      font-weight: 700;
      border-radius: 12px;
      margin-top: 16px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .btn-primary:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
        <line x1="6" y1="8" x2="6" y2="8" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <line x1="6" y1="12" x2="6" y2="12" stroke="#ff3b30" stroke-width="4" stroke-linecap="round"/>
        <line x1="6" y1="16" x2="6" y2="16" stroke="#ffcc00" stroke-width="4" stroke-linecap="round"/>
      </svg>
      Deutschway
    </h1>
  </div>

  <div class="glass">
    <div class="stats">
      <span>Tagesziel</span>
      <span id="xpText">0 / 50 XP</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div class="section-title">Dein Fortschritt</div>
    <div class="word-list" id="wordList">
      <!-- Words will be injected here -->
      <div style="font-size:0.85rem; color: var(--text-secondary);">Öffne die App, um Wörter zu lernen!</div>
    </div>
  </div>

  <div class="glass">
    <div class="settings">
      <span>Bei neuem Tab öffnen</span>
      <label class="toggle-switch">
        <input type="checkbox" id="openOnNewTabToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <button class="btn-primary" id="openAppBtn">Zur App gehen</button>

  <script src="popup.js"></script>
</body>
</html>
